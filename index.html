<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noor – Prayer Times for G2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #1a1a1a;
      --border:   #2e2e2e;
      --accent:   #ffcc00;
      --accent2:  #f9a825;
      --text:     #e8e8e8;
      --muted:    #888;
      --danger:   #ef5350;
      --radius:   12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 80px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 14px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .logo-icon img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .logo-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    .logo-text h1 span { color: var(--accent); }
    .logo-text p {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .status-badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: #2a2200;
      color: var(--accent);
      border: 1px solid #4a3a00;
    }
    .status-badge.connecting { background: #2a2a1e; color: #ffd740; border-color: #5a4a1e; }
    .status-badge.error      { background: #3a1e1e; color: var(--danger); border-color: #5a2a2a; }

    /* ── City card ──────────────────────────────────────── */
    .city-card {
      margin: 12px 16px 0;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .city-card-title {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .city-row {
      display: flex;
      gap: 8px;
    }
    .city-row input[type="text"] {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .city-row input[type="text"]:focus { border-color: var(--accent); }
    .city-row input[type="text"]::placeholder { color: var(--muted); }
    .btn-send {
      padding: 9px 18px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn-send:active { opacity: 0.7; }
    .btn-send.loading { opacity: 0.6; cursor: not-allowed; }
    .spinner {
      display: none;
      width: 13px; height: 13px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status message ─────────────────────────────────── */
    .status-msg {
      margin: 8px 16px 0;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      display: none;
    }
    .status-msg.success { display: block; background: #0d2b0d; color: #4caf50; border: 1px solid #1a4a1a; }
    .status-msg.error   { display: block; background: #2b0d0d; color: #f44336; border: 1px solid #4a1a1a; }
    .status-msg.info    { display: block; background: #1a1500; color: var(--accent); border: 1px solid #3a3000; }

    /* ── Info card ──────────────────────────────────────── */
    .info-card {
      margin: 10px 16px 0;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .info-card-title {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .info-item label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: block;
      margin-bottom: 2px;
    }
    .info-item span {
      font-size: 0.82rem;
      color: var(--text);
      font-weight: 500;
      word-break: break-word;
    }

    /* ── Hint ───────────────────────────────────────────── */
    .hint {
      margin: 14px 16px 0;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
    }

    /* ── Version ────────────────────────────────────────── */
    .version {
      margin: 20px 16px 0;
      font-size: 0.68rem;
      color: #333;
      text-align: center;
    }

    /* ── Toast ──────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1500;
      color: var(--accent);
      border: 1px solid #3a3000;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.85rem;
      transition: transform 0.25s ease;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">
          <img src="/icon-prayer-72.png" alt="Prayer icon" />
        </div>
        <div class="logo-text">
          <h1>Noor <span>Prayer</span></h1>
          <p>Even Realities G2</p>
        </div>
      </div>
      <span class="status-badge connecting" id="statusBadge">Connecting…</span>
    </div>
  </div>

  <!-- City input -->
  <div class="city-card">
    <div class="city-card-title">Your City</div>
    <div class="city-row">
      <input type="text" id="cityInput" placeholder="e.g. London, Dubai, Mecca" autocomplete="off" />
      <button class="btn-send" id="startBtn" onclick="saveAndStart()">
        <span class="spinner" id="spinner"></span>
        <span id="startLabel">Show on Glasses</span>
      </button>
    </div>
  </div>

  <!-- Status message -->
  <div class="status-msg" id="status"></div>

  <!-- Current settings -->
  <div class="info-card">
    <div class="info-card-title">Current Settings</div>
    <div class="info-grid">
      <div class="info-item">
        <label>City</label>
        <span id="currentCity">—</span>
      </div>
      <div class="info-item">
        <label>Timezone</label>
        <span id="timezone">—</span>
      </div>
      <div class="info-item">
        <label>Source</label>
        <span id="source">—</span>
      </div>
      <div class="info-item">
        <label>Version</label>
        <span id="versionSpan">—</span>
      </div>
    </div>
  </div>

  <!-- Hint -->
  <div class="hint">
    Double-tap on glasses to cycle between prayer list, countdown, and calendar.<br/>
    Times refresh automatically at midnight.
  </div>

  <div class="version" id="versionFooter">Noor Prayer</div>

</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script type="module" src="/src/main.ts"></script>
<script>
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2200)
}

// Poll for noor readiness
function pollNoor() {
  const badge = document.getElementById('statusBadge')
  if (window.noor) {
    badge.textContent = 'Connected'
    badge.className = 'status-badge'
    // Populate version
    const v = window.noor.version || ''
    if (v) {
      document.getElementById('versionSpan').textContent = v
      document.getElementById('versionFooter').textContent = 'Noor Prayer ' + v
    }
  } else {
    badge.textContent = 'Connecting…'
    badge.className = 'status-badge connecting'
  }
  setTimeout(pollNoor, 500)
}
pollNoor()
</script>
</body>
</html>
